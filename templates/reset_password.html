{% extends "base.html" %}
{% block title %}Reset Password - NeuroScan AI{% endblock %}
{% block content %}
<div class="form-wrapper">
    <div class="form-box">
        <h2>Reset Password</h2>
        <p class="subtext">Enter the OTP sent to <strong>{{ email }}</strong> and set a new password.</p>
        <form method="POST">
            <input type="number" name="otp" placeholder="Reset OTP" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
        <div class="form-footer">Didn’t get it? <a href="{{ url_for('auth.resend_otp', purpose='reset') }}">Resend Reset OTP</a></div>
    </div>
</div>
{% endblock %}
