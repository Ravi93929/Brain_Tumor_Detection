{% extends "base.html" %}
{% block title %}Forgot Password - NeuroScan AI{% endblock %}
{% block content %}
<div class="form-wrapper">
    <div class="form-box">
        <h2>Forgot Password</h2>
        <p class="subtext">Enter your registered email to receive a reset OTP.</p>
        <form method="POST">
            <input type="email" name="email" placeholder="Registered Email" required>
            <button type="submit" class="btn btn-primary">Send Reset OTP</button>
        </form>
    </div>
</div>
{% endblock %}
